    <style>
      .word-shell {
        width: min(100%, 560px);
        margin: 0 auto;
        padding: 1.2rem 1rem 1.4rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface) 92%, var(--bg)) 0%,
          color-mix(in srgb, var(--surface-soft) 90%, var(--bg)) 100%
        );
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .word-shell .page-title,
      .word-shell .page-label {
        width: 100%;
        text-align: center;
      }

      .word-score {
        display: inline-flex;
        align-items: baseline;
        gap: 0.15rem;
        font-family: var(--mono);
        font-size: 15px;
        margin-bottom: 1.25rem;
        letter-spacing: 0.04em;
        justify-content: center;
      }

      .word-score-label {
        color: var(--text-dim);
        font-size: 10px;
        letter-spacing: 0.14em;
        margin-right: 0.55rem;
        text-transform: uppercase;
      }

      .word-score-win {
        color: #5a6b47;
      }

      .word-score-loss {
        color: #c0392b;
      }

      .word-grid {
        display: grid;
        grid-template-rows: repeat(6, 1fr);
        gap: 0.4rem;
        width: min(100%, 360px);
      }

      .word-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.35rem;
      }

      .word-tile {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid #353535;
        background: #151515;
        color: #e8e8e8;
        font-family: var(--mono);
        font-size: clamp(1rem, 3.8vw, 1.48rem);
        font-weight: 700;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .word-tile.filled {
        border-color: #555;
      }

      .word-tile.absent {
        background: #2a2a2a;
        border-color: #2a2a2a;
      }

      .word-tile.present {
        background: #6f5f2f;
        border-color: #6f5f2f;
      }

      .word-tile.correct {
        background: #5a6b47;
        border-color: #5a6b47;
      }

      .word-row.shake {
        animation: word-shake 330ms ease;
      }

      @keyframes word-shake {
        0% {
          transform: translateX(0);
        }

        20% {
          transform: translateX(-7px);
        }

        40% {
          transform: translateX(7px);
        }

        60% {
          transform: translateX(-5px);
        }

        80% {
          transform: translateX(5px);
        }

        100% {
          transform: translateX(0);
        }
      }

      .word-status {
        min-height: 1.65rem;
        margin-top: 0.95rem;
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
        width: min(100%, 360px);
      }

      .word-status.error {
        color: #c0392b;
      }

      .word-status.success {
        color: #5a6b47;
      }

      .word-keyboard {
        margin-top: 1.2rem;
        display: grid;
        gap: 0.4rem;
        width: min(100%, 520px);
      }

      .word-key-row {
        display: flex;
        justify-content: center;
        gap: 0.34rem;
      }

      .word-key {
        min-width: 36px;
        height: 46px;
        border: 1px solid #2d2d2d;
        background: #171717;
        color: #d4d4d4;
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0 0.45rem;
        cursor: pointer;
      }

      .word-key[data-key="ENTER"],
      .word-key[data-key="BACKSPACE"] {
        min-width: 68px;
        font-size: 10px;
      }

      .word-key:hover:enabled {
        border-color: #4d4d4d;
        background: #1b1b1b;
      }

      .word-key:disabled {
        opacity: 0.48;
        cursor: not-allowed;
      }

      .word-key.absent {
        background: #2a2a2a;
        border-color: #2a2a2a;
      }

      .word-key.present {
        background: #6f5f2f;
        border-color: #6f5f2f;
      }

      .word-key.correct {
        background: #5a6b47;
        border-color: #5a6b47;
      }

      @media (max-width: 720px) {
        .word-shell {
          width: min(100%, 520px);
          padding: 1rem 0.85rem 1.2rem;
        }
      }

      @media (max-width: 560px) {
        .word-shell {
          width: 100%;
          padding: 0.85rem 0.55rem 1rem;
        }

        .word-key {
          min-width: 30px;
          height: 42px;
          padding: 0 0.24rem;
          font-size: 11px;
        }

        .word-key[data-key="ENTER"],
        .word-key[data-key="BACKSPACE"] {
          min-width: 56px;
          font-size: 9px;
        }
      }

      @media (max-width: 420px) {
        .word-shell {
          border-radius: 8px;
          padding: 0.8rem 0.45rem 0.95rem;
        }

        .word-grid,
        .word-status {
          width: min(100%, 340px);
        }

        .word-key-row {
          gap: 0.2rem;
        }

        .word-key {
          flex: 1 1 0;
          min-width: 0;
          height: 38px;
          padding: 0 0.18rem;
          font-size: 10px;
        }

        .word-key[data-key="ENTER"],
        .word-key[data-key="BACKSPACE"] {
          flex: 1.45 1 0;
          min-width: 0;
        }
      }
    </style>

      const WORD_LENGTH = 5;
      const MAX_GUESSES = 6;
      const STORAGE_STATS_KEY = "rosovo-word-stats-v1";
      const STORAGE_STATE_KEY = "rosovo-word-state-v1";
      const KEY_ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ENTER ZXCVBNM BACKSPACE"];
      const STATUS_PRIORITY = { absent: 0, present: 1, correct: 2 };

      const wordGridEl = document.getElementById("wordGrid");
      const wordStatusEl = document.getElementById("wordStatus");
      const wordKeyboardEl = document.getElementById("wordKeyboard");
      const winsEl = document.getElementById("wordWins");
      const lossesEl = document.getElementById("wordLosses");

      const validWordCache = new Map();
      const keyElements = new Map();

      let stats = loadStats();
      let game = buildInitialGame();

      updateScoreboard();
      renderKeyboard();
      renderBoard();
      applyKeyboardColors();
      syncInputState();

      if (game.completed) {
        setStatus(
          getCompletionMessage(game),
          game.outcome === "win" ? "success" : "error",
        );
      }

      document.addEventListener("keydown", handlePhysicalKey);

      function buildInitialGame() {
        const today = getTodayKey();
        const target = pickWordForDate(today);
        const saved = loadSavedState();

        if (saved && saved.date === today && saved.target === target) {
          return {
            ...saved,
            currentGuess: "",
          };
        }

        return {
          date: today,
          target,
          guesses: [],
          evaluations: [],
          keyboard: {},
          completed: false,
          outcome: null,
          currentGuess: "",
        };
      }

      function loadStats() {
        try {
          const raw = localStorage.getItem(STORAGE_STATS_KEY);
          if (!raw) {
            return {
              wins: 0,
              losses: 0,
              lastPlayedDate: null,
              lastResult: null,
            };
          }

          const parsed = JSON.parse(raw);
          return {
            wins: Number(parsed.wins) || 0,
            losses: Number(parsed.losses) || 0,
            lastPlayedDate: parsed.lastPlayedDate || null,
            lastResult: parsed.lastResult || null,
          };
        } catch (error) {
          return { wins: 0, losses: 0, lastPlayedDate: null, lastResult: null };
        }
      }

      function saveStats() {
        localStorage.setItem(STORAGE_STATS_KEY, JSON.stringify(stats));
      }

      function loadSavedState() {
        try {
          const raw = localStorage.getItem(STORAGE_STATE_KEY);
          if (!raw) {
            return null;
          }

          const parsed = JSON.parse(raw);
          if (
            !Array.isArray(parsed.guesses) ||
            !Array.isArray(parsed.evaluations)
          ) {
            return null;
          }

          return {
            date: parsed.date,
            target: parsed.target,
            guesses: parsed.guesses,
            evaluations: parsed.evaluations,
            keyboard: parsed.keyboard || {},
            completed: Boolean(parsed.completed),
            outcome: parsed.outcome || null,
          };
        } catch (error) {
          return null;
        }
      }

      function saveGameState() {
        localStorage.setItem(
          STORAGE_STATE_KEY,
          JSON.stringify({
            date: game.date,
            target: game.target,
            guesses: game.guesses,
            evaluations: game.evaluations,
            keyboard: game.keyboard,
            completed: game.completed,
            outcome: game.outcome,
          }),
        );
      }

      function updateScoreboard() {
        winsEl.textContent = String(stats.wins);
        lossesEl.textContent = String(stats.losses);
      }

      function getTodayKey() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function hashDate(dateString) {
        let hash = 2166136261;
        for (let i = 0; i < dateString.length; i += 1) {
          hash ^= dateString.charCodeAt(i);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function pickWordForDate(dateString) {
        const index = hashDate(dateString) % COMMON_WORDS.length;
        return COMMON_WORDS[index];
      }

      function renderBoard() {
        wordGridEl.innerHTML = "";

        for (let rowIndex = 0; rowIndex < MAX_GUESSES; rowIndex += 1) {
          const rowEl = document.createElement("div");
          rowEl.className = "word-row";
          rowEl.dataset.rowIndex = String(rowIndex);

          const guess = game.guesses[rowIndex] || "";
          const statuses = game.evaluations[rowIndex] || [];
          const currentRow =
            !game.completed && rowIndex === game.guesses.length
              ? game.currentGuess
              : "";

          for (let colIndex = 0; colIndex < WORD_LENGTH; colIndex += 1) {
            const tileEl = document.createElement("div");
            tileEl.className = "word-tile";

            const letter = guess[colIndex] || currentRow[colIndex] || "";
            tileEl.textContent = letter;

            if (letter) {
              tileEl.classList.add("filled");
            }

            const status = statuses[colIndex];
            if (status) {
              tileEl.classList.add(status);
            }

            rowEl.appendChild(tileEl);
          }

          wordGridEl.appendChild(rowEl);
        }
      }

      function renderKeyboard() {
        wordKeyboardEl.innerHTML = "";
        keyElements.clear();

        KEY_ROWS.forEach((rowPattern) => {
          const rowEl = document.createElement("div");
          rowEl.className = "word-key-row";

          rowPattern.split(" ").forEach((segment) => {
            if (segment === "ENTER" || segment === "BACKSPACE") {
              const keyEl = createKey(
                segment,
                segment === "BACKSPACE" ? "Del" : "Enter",
              );
              rowEl.appendChild(keyEl);
              return;
            }

            segment.split("").forEach((char) => {
              const keyEl = createKey(char, char);
              rowEl.appendChild(keyEl);
            });
          });

          wordKeyboardEl.appendChild(rowEl);
        });
      }

      function createKey(keyValue, label) {
        const keyEl = document.createElement("button");
        keyEl.type = "button";
        keyEl.className = "word-key";
        keyEl.dataset.key = keyValue;
        keyEl.textContent = label;
        keyEl.addEventListener("click", () => handleInput(keyValue));
        keyElements.set(keyValue, keyEl);
        return keyEl;
      }

      function applyKeyboardColors() {
        keyElements.forEach((keyEl, keyValue) => {
          if (keyValue === "ENTER" || keyValue === "BACKSPACE") {
            return;
          }

          keyEl.classList.remove("absent", "present", "correct");
          const status = game.keyboard[keyValue.toLowerCase()];
          if (status) {
            keyEl.classList.add(status);
          }
        });
      }

      function syncInputState() {
        const disabled = game.completed;
        keyElements.forEach((keyEl) => {
          keyEl.disabled = disabled;
        });
      }

      function handlePhysicalKey(event) {
        if (event.ctrlKey || event.metaKey || event.altKey) {
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          handleInput("ENTER");
          return;
        }

        if (event.key === "Backspace") {
          event.preventDefault();
          handleInput("BACKSPACE");
          return;
        }

        if (/^[a-zA-Z]$/.test(event.key)) {
          event.preventDefault();
          handleInput(event.key.toUpperCase());
        }
      }

      function handleInput(key) {
        if (game.completed) {
          return;
        }

        clearStatusIfError();

        if (key === "ENTER") {
          submitGuess();
          return;
        }

        if (key === "BACKSPACE") {
          if (game.currentGuess.length > 0) {
            game.currentGuess = game.currentGuess.slice(0, -1);
            renderBoard();
          }
          return;
        }

        if (/^[A-Z]$/.test(key) && game.currentGuess.length < WORD_LENGTH) {
          game.currentGuess += key.toLowerCase();
          renderBoard();
        }
      }

      async function submitGuess() {
        if (game.currentGuess.length !== WORD_LENGTH) {
          setStatus("Guess must be 5 letters.", "error");
          shakeCurrentRow();
          return;
        }

        const guess = game.currentGuess.toLowerCase();
        const isValid = await validateWord(guess);
        if (!isValid) {
          setStatus("That word is not recognized.", "error");
          shakeCurrentRow();
          return;
        }

        const evaluation = evaluateGuess(guess, game.target);
        game.guesses.push(guess);
        game.evaluations.push(evaluation);
        game.currentGuess = "";
        updateKeyboardState(guess, evaluation);

        const won = guess === game.target;
        const exhausted = game.guesses.length >= MAX_GUESSES;

        if (won) {
          game.completed = true;
          game.outcome = "win";
          recordDailyCompletion("win");
          setStatus(
            "Nice solve. The word was " + game.target.toUpperCase() + ".",
            "success",
          );
        } else if (exhausted) {
          game.completed = true;
          game.outcome = "loss";
          recordDailyCompletion("loss");
          setStatus(
            "No guesses left. The word was " + game.target.toUpperCase() + ".",
            "error",
          );
        } else {
          setStatus("");
        }

        saveGameState();
        renderBoard();
        applyKeyboardColors();
        syncInputState();
      }

      function updateKeyboardState(guess, evaluation) {
        for (let i = 0; i < guess.length; i += 1) {
          const letter = guess[i];
          const nextStatus = evaluation[i];
          const currentStatus = game.keyboard[letter];
          if (
            !currentStatus ||
            STATUS_PRIORITY[nextStatus] > STATUS_PRIORITY[currentStatus]
          ) {
            game.keyboard[letter] = nextStatus;
          }
        }
      }

      function evaluateGuess(guess, target) {
        const result = new Array(WORD_LENGTH).fill("absent");
        const targetChars = target.split("");
        const guessChars = guess.split("");

        for (let i = 0; i < WORD_LENGTH; i += 1) {
          if (guessChars[i] === targetChars[i]) {
            result[i] = "correct";
            targetChars[i] = null;
            guessChars[i] = null;
          }
        }

        for (let i = 0; i < WORD_LENGTH; i += 1) {
          if (!guessChars[i]) {
            continue;
          }

          const matchIndex = targetChars.indexOf(guessChars[i]);
          if (matchIndex !== -1) {
            result[i] = "present";
            targetChars[matchIndex] = null;
          }
        }

        return result;
      }

      async function validateWord(word) {
        if (validWordCache.has(word)) {
          return validWordCache.get(word);
        }

        try {
          const response = await fetch(
            "https://api.dictionaryapi.dev/api/v2/entries/en/" +
              encodeURIComponent(word),
          );
          const valid = response.ok;
          validWordCache.set(word, valid);
          return valid;
        } catch (error) {
          setStatus(
            "Dictionary lookup failed. Check your connection.",
            "error",
          );
          return false;
        }
      }

      function recordDailyCompletion(result) {
        if (stats.lastPlayedDate === game.date) {
          return;
        }

        if (result === "win") {
          stats.wins += 1;
        } else {
          stats.losses += 1;
        }

        stats.lastPlayedDate = game.date;
        stats.lastResult = result;
        updateScoreboard();
        saveStats();
      }

      function getCompletionMessage(state) {
        if (state.outcome === "win") {
          return (
            "You already solved today's puzzle. The word was " +
            state.target.toUpperCase() +
            "."
          );
        }

        if (state.outcome === "loss") {
          return (
            "You already finished today's puzzle. The word was " +
            state.target.toUpperCase() +
            "."
          );
        }

        return "Today's puzzle is already completed.";
      }

      function setStatus(message, tone) {
        wordStatusEl.textContent = message;
        wordStatusEl.classList.remove("error", "success");
        if (tone === "error" || tone === "success") {
          wordStatusEl.classList.add(tone);
        }
      }

      function clearStatusIfError() {
        if (wordStatusEl.classList.contains("error")) {
          setStatus("");
        }
      }

      function shakeCurrentRow() {
        const rowIndex = Math.min(game.guesses.length, MAX_GUESSES - 1);
        const rowEl = wordGridEl.querySelector(
          '[data-row-index="' + rowIndex + '"]',
        );
        if (!rowEl) {
          return;
        }

        rowEl.classList.remove("shake");
        void rowEl.offsetWidth;
        rowEl.classList.add("shake");
      }
